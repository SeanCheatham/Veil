# Veil - Docker Compose Scaffold
# All services defined with alpine placeholder images
# Will be replaced with actual service images as they are implemented

services:
  # Relay nodes (x5) - Onion layer peeling, mix-and-forward
  relay-node-1:
    image: alpine:latest
    container_name: veil-relay-node-1
    command: ["sleep", "infinity"]
    networks:
      - veil-network
    environment:
      - NODE_ID=relay-1
      - NODE_TYPE=relay
      - PORT=8081
      - EPOCH_CLOCK_URL=http://epoch-clock:8083
      - RELAY_PEERS=http://relay-node-1:8081,http://relay-node-2:8081,http://relay-node-3:8081,http://relay-node-4:8081,http://relay-node-5:8081
      - VALIDATOR_ENDPOINTS=http://validator-node-1:8082,http://validator-node-2:8082,http://validator-node-3:8082

  relay-node-2:
    image: alpine:latest
    container_name: veil-relay-node-2
    command: ["sleep", "infinity"]
    networks:
      - veil-network
    environment:
      - NODE_ID=relay-2
      - NODE_TYPE=relay
      - PORT=8081
      - EPOCH_CLOCK_URL=http://epoch-clock:8083
      - RELAY_PEERS=http://relay-node-1:8081,http://relay-node-2:8081,http://relay-node-3:8081,http://relay-node-4:8081,http://relay-node-5:8081
      - VALIDATOR_ENDPOINTS=http://validator-node-1:8082,http://validator-node-2:8082,http://validator-node-3:8082

  relay-node-3:
    image: alpine:latest
    container_name: veil-relay-node-3
    command: ["sleep", "infinity"]
    networks:
      - veil-network
    environment:
      - NODE_ID=relay-3
      - NODE_TYPE=relay
      - PORT=8081
      - EPOCH_CLOCK_URL=http://epoch-clock:8083
      - RELAY_PEERS=http://relay-node-1:8081,http://relay-node-2:8081,http://relay-node-3:8081,http://relay-node-4:8081,http://relay-node-5:8081
      - VALIDATOR_ENDPOINTS=http://validator-node-1:8082,http://validator-node-2:8082,http://validator-node-3:8082

  relay-node-4:
    image: alpine:latest
    container_name: veil-relay-node-4
    command: ["sleep", "infinity"]
    networks:
      - veil-network
    environment:
      - NODE_ID=relay-4
      - NODE_TYPE=relay
      - PORT=8081
      - EPOCH_CLOCK_URL=http://epoch-clock:8083
      - RELAY_PEERS=http://relay-node-1:8081,http://relay-node-2:8081,http://relay-node-3:8081,http://relay-node-4:8081,http://relay-node-5:8081
      - VALIDATOR_ENDPOINTS=http://validator-node-1:8082,http://validator-node-2:8082,http://validator-node-3:8082

  relay-node-5:
    image: alpine:latest
    container_name: veil-relay-node-5
    command: ["sleep", "infinity"]
    networks:
      - veil-network
    environment:
      - NODE_ID=relay-5
      - NODE_TYPE=relay
      - PORT=8081
      - EPOCH_CLOCK_URL=http://epoch-clock:8083
      - RELAY_PEERS=http://relay-node-1:8081,http://relay-node-2:8081,http://relay-node-3:8081,http://relay-node-4:8081,http://relay-node-5:8081
      - VALIDATOR_ENDPOINTS=http://validator-node-1:8082,http://validator-node-2:8082,http://validator-node-3:8082

  # Byzantine relay node (x1) - Malicious relay for adversarial testing
  relay-node-byzantine:
    image: alpine:latest
    container_name: veil-relay-node-byzantine
    command: ["sleep", "infinity"]
    networks:
      - veil-network
    environment:
      - NODE_ID=byzantine-relay-1
      - NODE_TYPE=relay
      - PORT=8081
      - EPOCH_CLOCK_URL=http://epoch-clock:8083
      - RELAY_PEERS=http://relay-node-1:8081,http://relay-node-2:8081,http://relay-node-3:8081,http://relay-node-4:8081,http://relay-node-5:8081,http://relay-node-byzantine:8081
      - VALIDATOR_ENDPOINTS=http://validator-node-1:8082,http://validator-node-2:8082,http://validator-node-3:8082

  # Validator nodes (x3) - BFT consensus, message pool ordering
  validator-node-1:
    image: alpine:latest
    container_name: veil-validator-node-1
    command: ["sleep", "infinity"]
    networks:
      - veil-network
    environment:
      - NODE_ID=validator-1
      - NODE_TYPE=validator
      - PORT=8082
      - VALIDATOR_PEERS=http://validator-node-1:8082,http://validator-node-2:8082,http://validator-node-3:8082
      - MESSAGE_POOL_URL=http://message-pool:8080

  validator-node-2:
    image: alpine:latest
    container_name: veil-validator-node-2
    command: ["sleep", "infinity"]
    networks:
      - veil-network
    environment:
      - NODE_ID=validator-2
      - NODE_TYPE=validator
      - PORT=8082
      - VALIDATOR_PEERS=http://validator-node-1:8082,http://validator-node-2:8082,http://validator-node-3:8082
      - MESSAGE_POOL_URL=http://message-pool:8080

  validator-node-3:
    image: alpine:latest
    container_name: veil-validator-node-3
    command: ["sleep", "infinity"]
    networks:
      - veil-network
    environment:
      - NODE_ID=validator-3
      - NODE_TYPE=validator
      - PORT=8082
      - VALIDATOR_PEERS=http://validator-node-1:8082,http://validator-node-2:8082,http://validator-node-3:8082
      - MESSAGE_POOL_URL=http://message-pool:8080

  # Message pool (x1) - Append-only ciphertext store
  message-pool:
    image: alpine:latest
    container_name: veil-message-pool
    command: ["sleep", "infinity"]
    networks:
      - veil-network
    environment:
      - NODE_ID=pool-1
      - NODE_TYPE=pool

  # Epoch clock (x1) - Epoch timer and key rotation coordinator
  epoch-clock:
    image: alpine:latest
    container_name: veil-epoch-clock
    command: ["sleep", "infinity"]
    networks:
      - veil-network
    environment:
      - NODE_ID=epoch-1
      - NODE_TYPE=epoch
      - PORT=8083
      - EPOCH_INTERVAL=10s

  # Sender workload (x1) - Test driver: generates and sends messages
  sender-workload:
    image: alpine:latest
    container_name: veil-sender-workload
    command: ["sleep", "infinity"]
    networks:
      - veil-network
    environment:
      - NODE_ID=sender-1
      - NODE_TYPE=workload
      - RELAY_ENDPOINTS=http://relay-node-1:8081,http://relay-node-2:8081,http://relay-node-3:8081,http://relay-node-4:8081,http://relay-node-5:8081,http://relay-node-byzantine:8081
      - EPOCH_CLOCK_URL=http://epoch-clock:8083
      # Deterministic receiver X25519 public key (derived from sha256("veil-test-receiver") as seed)
      - RECEIVER_PUBKEY=1mgNxDbQcLwJI9FKQE/vGnQWSG5bcNxvSDyiosjAwm0=
    depends_on:
      - message-pool
      - epoch-clock
      - relay-node-1
      - relay-node-2
      - relay-node-3
      - relay-node-4
      - relay-node-5
      - relay-node-byzantine

  # Receiver workload (x1) - Test driver: polls pool, asserts delivery
  receiver-workload:
    image: alpine:latest
    container_name: veil-receiver-workload
    command: ["sleep", "infinity"]
    networks:
      - veil-network
    environment:
      - NODE_ID=receiver-1
      - NODE_TYPE=workload
      - MESSAGE_POOL_URL=http://message-pool:8080
    depends_on:
      - message-pool

networks:
  veil-network:
    driver: bridge
