services:
  # Hello service - minimal HTTP server for initial validation
  hello:
    image: ${REGISTRY:-veil}/hello:${TAG:-latest}
    container_name: hello
    hostname: hello
    init: true
    expose:
      - "8080"
    environment:
      - PORT=8080
    healthcheck:
      test: ["CMD", "wget", "--spider", "--quiet", "http://localhost:8080/health"]
      interval: 5s
      timeout: 5s
      retries: 3
      start_period: 10s

  # Message Pool - starts first
  message-pool:
    image: ${REGISTRY:-veil}/message-pool:${TAG:-latest}
    container_name: message-pool
    hostname: message-pool
    init: true
    expose:
      - "8082"
    healthcheck:
      test: ["CMD", "wget", "--spider", "--quiet", "http://localhost:8082/health"]
      interval: 5s
      timeout: 5s
      retries: 3
      start_period: 10s

  # Validator nodes - depend on message-pool
  validator-node0:
    image: ${REGISTRY:-veil}/validator-node:${TAG:-latest}
    container_name: validator-node0
    hostname: validator-node0
    init: true
    labels:
      - "antithesis.partition.group=validators"
    environment:
      - VALIDATOR_ID=0
      - MESSAGE_POOL_URL=http://message-pool:8082
      - VALIDATOR_PEERS=http://validator-node1:8081,http://validator-node2:8081
    expose:
      - "8081"
    healthcheck:
      test: ["CMD", "wget", "--spider", "--quiet", "http://localhost:8081/health"]
      interval: 5s
      timeout: 5s
      retries: 3
      start_period: 10s
    depends_on:
      message-pool:
        condition: service_healthy

  validator-node1:
    image: ${REGISTRY:-veil}/validator-node:${TAG:-latest}
    container_name: validator-node1
    hostname: validator-node1
    init: true
    labels:
      - "antithesis.partition.group=validators"
    environment:
      - VALIDATOR_ID=1
      - MESSAGE_POOL_URL=http://message-pool:8082
      - VALIDATOR_PEERS=http://validator-node0:8081,http://validator-node2:8081
    expose:
      - "8081"
    healthcheck:
      test: ["CMD", "wget", "--spider", "--quiet", "http://localhost:8081/health"]
      interval: 5s
      timeout: 5s
      retries: 3
      start_period: 10s
    depends_on:
      message-pool:
        condition: service_healthy

  validator-node2:
    image: ${REGISTRY:-veil}/validator-node:${TAG:-latest}
    container_name: validator-node2
    hostname: validator-node2
    init: true
    labels:
      - "antithesis.partition.group=validators"
    environment:
      - VALIDATOR_ID=2
      - MESSAGE_POOL_URL=http://message-pool:8082
      - VALIDATOR_PEERS=http://validator-node0:8081,http://validator-node1:8081
    expose:
      - "8081"
    healthcheck:
      test: ["CMD", "wget", "--spider", "--quiet", "http://localhost:8081/health"]
      interval: 5s
      timeout: 5s
      retries: 3
      start_period: 10s
    depends_on:
      message-pool:
        condition: service_healthy

  # Relay nodes - depend on validator-nodes
  # Chain: relay0 -> relay1 -> relay2 -> relay3 -> relay4 -> validator
  # Now using epoch-based key rotation with master seeds
  relay-node0:
    image: ${REGISTRY:-veil}/relay-node:${TAG:-latest}
    container_name: relay-node0
    hostname: relay-node0
    init: true
    labels:
      - "antithesis.partition.group=relays"
    environment:
      - RELAY_ID=0
      - NEXT_HOP=relay-node1:8080
      - RELAY_MASTER_SEED=KzNhvFWQe7yR8pBwXdC4TmJgUoHaLsYx1q9nI3rE6Mk=
      - EPOCH_DURATION_SECONDS=60
    expose:
      - "8080"
    healthcheck:
      test: ["CMD", "wget", "--spider", "--quiet", "http://localhost:8080/health"]
      interval: 5s
      timeout: 5s
      retries: 3
      start_period: 10s
    depends_on:
      validator-node0:
        condition: service_healthy
      validator-node1:
        condition: service_healthy
      validator-node2:
        condition: service_healthy

  relay-node1:
    image: ${REGISTRY:-veil}/relay-node:${TAG:-latest}
    container_name: relay-node1
    hostname: relay-node1
    init: true
    labels:
      - "antithesis.partition.group=relays"
    environment:
      - RELAY_ID=1
      - NEXT_HOP=relay-node2:8080
      - RELAY_MASTER_SEED=VpQcGtYw2hXjNsKmL8bFrDe5oU7iA0nZ4xWvJz3C1Hg=
      - EPOCH_DURATION_SECONDS=60
    expose:
      - "8080"
    healthcheck:
      test: ["CMD", "wget", "--spider", "--quiet", "http://localhost:8080/health"]
      interval: 5s
      timeout: 5s
      retries: 3
      start_period: 10s
    depends_on:
      validator-node0:
        condition: service_healthy
      validator-node1:
        condition: service_healthy
      validator-node2:
        condition: service_healthy

  relay-node2:
    image: ${REGISTRY:-veil}/relay-node:${TAG:-latest}
    container_name: relay-node2
    hostname: relay-node2
    init: true
    labels:
      - "antithesis.partition.group=relays"
    environment:
      - RELAY_ID=2
      - NEXT_HOP=relay-node3:8080
      - RELAY_MASTER_SEED=BwS9fXkMnYz1pTqR7vO2hJc4uE6gLaI8xKdNmW0sAVe=
      - EPOCH_DURATION_SECONDS=60
    expose:
      - "8080"
    healthcheck:
      test: ["CMD", "wget", "--spider", "--quiet", "http://localhost:8080/health"]
      interval: 5s
      timeout: 5s
      retries: 3
      start_period: 10s
    depends_on:
      validator-node0:
        condition: service_healthy
      validator-node1:
        condition: service_healthy
      validator-node2:
        condition: service_healthy

  relay-node3:
    image: ${REGISTRY:-veil}/relay-node:${TAG:-latest}
    container_name: relay-node3
    hostname: relay-node3
    init: true
    labels:
      - "antithesis.partition.group=relays"
    environment:
      - RELAY_ID=3
      - NEXT_HOP=relay-node4:8080
      - RELAY_MASTER_SEED=DqH4mZy5oP1tVw8nKjR3bF6iA9xSgLcE7uN2aWsXkMf=
      - EPOCH_DURATION_SECONDS=60
    expose:
      - "8080"
    healthcheck:
      test: ["CMD", "wget", "--spider", "--quiet", "http://localhost:8080/health"]
      interval: 5s
      timeout: 5s
      retries: 3
      start_period: 10s
    depends_on:
      validator-node0:
        condition: service_healthy
      validator-node1:
        condition: service_healthy
      validator-node2:
        condition: service_healthy

  relay-node4:
    image: ${REGISTRY:-veil}/relay-node:${TAG:-latest}
    container_name: relay-node4
    hostname: relay-node4
    init: true
    labels:
      - "antithesis.partition.group=relays"
    environment:
      - RELAY_ID=4
      - NEXT_HOP=
      - VALIDATOR_URL=http://validator-node0:8081
      - RELAY_MASTER_SEED=FzK7pYn5wT0rMeB8jC1hXgU3vI6aLdS4oQsN9xWmEqH=
      - EPOCH_DURATION_SECONDS=60
    expose:
      - "8080"
    healthcheck:
      test: ["CMD", "wget", "--spider", "--quiet", "http://localhost:8080/health"]
      interval: 5s
      timeout: 5s
      retries: 3
      start_period: 10s
    depends_on:
      validator-node0:
        condition: service_healthy
      validator-node1:
        condition: service_healthy
      validator-node2:
        condition: service_healthy

  # Workloads - test drivers, no healthchecks
  sender-workload:
    image: ${REGISTRY:-veil}/sender-workload:${TAG:-latest}
    container_name: sender-workload
    hostname: sender-workload
    init: true
    environment:
      - RELAY_URL=http://relay-node0:8080
      - MESSAGE_INTERVAL_MS=1000
      - SENDER_ID=sender-0
      - EPOCH_DURATION_SECONDS=60
      - COVER_TRAFFIC_RATE=0.5
      - RELAY_MASTER_SEEDS=KzNhvFWQe7yR8pBwXdC4TmJgUoHaLsYx1q9nI3rE6Mk=,VpQcGtYw2hXjNsKmL8bFrDe5oU7iA0nZ4xWvJz3C1Hg=,BwS9fXkMnYz1pTqR7vO2hJc4uE6gLaI8xKdNmW0sAVe=,DqH4mZy5oP1tVw8nKjR3bF6iA9xSgLcE7uN2aWsXkMf=,FzK7pYn5wT0rMeB8jC1hXgU3vI6aLdS4oQsN9xWmEqH=
    depends_on:
      relay-node0:
        condition: service_healthy
      relay-node1:
        condition: service_healthy
      relay-node2:
        condition: service_healthy
      relay-node3:
        condition: service_healthy
      relay-node4:
        condition: service_healthy

  receiver-workload:
    image: ${REGISTRY:-veil}/receiver-workload:${TAG:-latest}
    container_name: receiver-workload
    hostname: receiver-workload
    init: true
    environment:
      - MESSAGE_POOL_URL=http://message-pool:8082
    depends_on:
      relay-node0:
        condition: service_healthy
      relay-node1:
        condition: service_healthy
      relay-node2:
        condition: service_healthy
      relay-node3:
        condition: service_healthy
      relay-node4:
        condition: service_healthy

  # Test-composer workloads - run once before fault injection
  # first_setup - validates services_reachable property
  first_setup:
    image: ${REGISTRY:-veil}/first_setup:${TAG:-latest}
    container_name: first_setup
    hostname: first_setup
    init: true
    environment:
      - HELLO_URL=http://hello:8080
    depends_on:
      hello:
        condition: service_healthy

  # first_pool_health - validates message-pool health and append-only property
  first_pool_health:
    image: ${REGISTRY:-veil}/pool_health:${TAG:-latest}
    container_name: first_pool_health
    hostname: first_pool_health
    init: true
    environment:
      - MESSAGE_POOL_URL=http://message-pool:8082
    depends_on:
      message-pool:
        condition: service_healthy

  # first_validator_health - validates validator health, submit, and pool integration
  first_validator_health:
    image: ${REGISTRY:-veil}/validator_health:${TAG:-latest}
    container_name: first_validator_health
    hostname: first_validator_health
    init: true
    environment:
      - VALIDATOR_URLS=http://validator-node0:8081,http://validator-node1:8081,http://validator-node2:8081
      - MESSAGE_POOL_URL=http://message-pool:8082
    depends_on:
      validator-node0:
        condition: service_healthy
      validator-node1:
        condition: service_healthy
      validator-node2:
        condition: service_healthy

  # first_relay_health - validates relay chain health and message propagation
  first_relay_health:
    image: ${REGISTRY:-veil}/relay_health:${TAG:-latest}
    container_name: first_relay_health
    hostname: first_relay_health
    init: true
    environment:
      - RELAY_URLS=http://relay-node0:8080,http://relay-node1:8080,http://relay-node2:8080,http://relay-node3:8080,http://relay-node4:8080
      - MESSAGE_POOL_URL=http://message-pool:8082
      - EPOCH_DURATION_SECONDS=60
      - RELAY_MASTER_SEEDS=KzNhvFWQe7yR8pBwXdC4TmJgUoHaLsYx1q9nI3rE6Mk=,VpQcGtYw2hXjNsKmL8bFrDe5oU7iA0nZ4xWvJz3C1Hg=,BwS9fXkMnYz1pTqR7vO2hJc4uE6gLaI8xKdNmW0sAVe=,DqH4mZy5oP1tVw8nKjR3bF6iA9xSgLcE7uN2aWsXkMf=,FzK7pYn5wT0rMeB8jC1hXgU3vI6aLdS4oQsN9xWmEqH=
    depends_on:
      relay-node0:
        condition: service_healthy
      relay-node1:
        condition: service_healthy
      relay-node2:
        condition: service_healthy
      relay-node3:
        condition: service_healthy
      relay-node4:
        condition: service_healthy

  # first_onion_integrity - validates onion encryption properties
  first_onion_integrity:
    image: ${REGISTRY:-veil}/onion_integrity:${TAG:-latest}
    container_name: first_onion_integrity
    hostname: first_onion_integrity
    init: true
    environment:
      - RELAY_URL=http://relay-node0:8080
      - MESSAGE_POOL_URL=http://message-pool:8082
      - EPOCH_DURATION_SECONDS=60
      - RELAY_MASTER_SEEDS=KzNhvFWQe7yR8pBwXdC4TmJgUoHaLsYx1q9nI3rE6Mk=,VpQcGtYw2hXjNsKmL8bFrDe5oU7iA0nZ4xWvJz3C1Hg=,BwS9fXkMnYz1pTqR7vO2hJc4uE6gLaI8xKdNmW0sAVe=,DqH4mZy5oP1tVw8nKjR3bF6iA9xSgLcE7uN2aWsXkMf=,FzK7pYn5wT0rMeB8jC1hXgU3vI6aLdS4oQsN9xWmEqH=
    depends_on:
      relay-node0:
        condition: service_healthy
      relay-node1:
        condition: service_healthy
      relay-node2:
        condition: service_healthy
      relay-node3:
        condition: service_healthy
      relay-node4:
        condition: service_healthy

  # first_consensus_test - validates PBFT consensus properties
  first_consensus_test:
    image: ${REGISTRY:-veil}/consensus_test:${TAG:-latest}
    container_name: first_consensus_test
    hostname: first_consensus_test
    init: true
    environment:
      - VALIDATOR_URLS=http://validator-node0:8081,http://validator-node1:8081,http://validator-node2:8081
      - MESSAGE_POOL_URL=http://message-pool:8082
    depends_on:
      validator-node0:
        condition: service_healthy
      validator-node1:
        condition: service_healthy
      validator-node2:
        condition: service_healthy

  # first_cover_traffic_test - validates cover traffic generation and mixing
  first_cover_traffic_test:
    image: ${REGISTRY:-veil}/cover_traffic_test:${TAG:-latest}
    container_name: first_cover_traffic_test
    hostname: first_cover_traffic_test
    init: true
    environment:
      - RELAY_URL=http://relay-node0:8080
      - MESSAGE_POOL_URL=http://message-pool:8082
      - EPOCH_DURATION_SECONDS=60
      - COVER_TRAFFIC_RATE=0.5
      - RELAY_MASTER_SEEDS=KzNhvFWQe7yR8pBwXdC4TmJgUoHaLsYx1q9nI3rE6Mk=,VpQcGtYw2hXjNsKmL8bFrDe5oU7iA0nZ4xWvJz3C1Hg=,BwS9fXkMnYz1pTqR7vO2hJc4uE6gLaI8xKdNmW0sAVe=,DqH4mZy5oP1tVw8nKjR3bF6iA9xSgLcE7uN2aWsXkMf=,FzK7pYn5wT0rMeB8jC1hXgU3vI6aLdS4oQsN9xWmEqH=
    depends_on:
      relay-node0:
        condition: service_healthy
      relay-node1:
        condition: service_healthy
      relay-node2:
        condition: service_healthy
      relay-node3:
        condition: service_healthy
      relay-node4:
        condition: service_healthy

  # first_epoch_rotation_test - validates epoch key rotation properties
  first_epoch_rotation_test:
    image: ${REGISTRY:-veil}/epoch_rotation_test:${TAG:-latest}
    container_name: first_epoch_rotation_test
    hostname: first_epoch_rotation_test
    init: true
    environment:
      - RELAY_URL=http://relay-node0:8080
      - MESSAGE_POOL_URL=http://message-pool:8082
      - EPOCH_DURATION_SECONDS=60
      - RELAY_MASTER_SEEDS=KzNhvFWQe7yR8pBwXdC4TmJgUoHaLsYx1q9nI3rE6Mk=,VpQcGtYw2hXjNsKmL8bFrDe5oU7iA0nZ4xWvJz3C1Hg=,BwS9fXkMnYz1pTqR7vO2hJc4uE6gLaI8xKdNmW0sAVe=,DqH4mZy5oP1tVw8nKjR3bF6iA9xSgLcE7uN2aWsXkMf=,FzK7pYn5wT0rMeB8jC1hXgU3vI6aLdS4oQsN9xWmEqH=
    depends_on:
      relay-node0:
        condition: service_healthy
      relay-node1:
        condition: service_healthy
      relay-node2:
        condition: service_healthy
      relay-node3:
        condition: service_healthy
      relay-node4:
        condition: service_healthy
