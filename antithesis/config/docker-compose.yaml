      dockerfile: Dockerfile.relay
    image: ${ANTITHESIS_REPOSITORY}/relay:latest
    expose:
      - "8083"
    init: true
    environment:
      - RELAY_ID=4
      - EPOCH_DURATION=15s
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:8083/health"]
      interval: 2s
