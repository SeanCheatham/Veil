      - "8082"
    init: true
    environment:
      - VALIDATOR_ID=3
      - LEADER_HOST=validator-1
      - VALIDATOR_PEERS=validator-1:8082,validator-2:8082,validator-3:8082
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:8082/health"]
      interval: 2s
      timeout: 5s
      retries: 10
    depends_on:
      message-pool:
        condition: service_healthy

  relay-1:
    container_name: relay-1
    hostname: relay-1
    build:
      context: ../..
      dockerfile: Dockerfile.relay
    image: ${ANTITHESIS_REPOSITORY}/relay:latest
    expose:
      - "8083"
    init: true
    environment:
      - RELAY_ID=1
      - EPOCH_DURATION=15s
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:8083/health"]
      interval: 2s
      timeout: 5s
      retries: 10
    depends_on:
      message-pool:
        condition: service_healthy
      validator-1:
        condition: service_healthy
      validator-2:
        condition: service_healthy
      validator-3:
        condition: service_healthy

  relay-2:
    container_name: relay-2
    hostname: relay-2
    build:
      context: ../..
      dockerfile: Dockerfile.relay
    image: ${ANTITHESIS_REPOSITORY}/relay:latest
