      validator-2:
        condition: service_healthy
      validator-3:
        condition: service_healthy
      relay-1:
        condition: service_healthy
      relay-2:
        condition: service_healthy
      relay-3:
        condition: service_healthy
      relay-4:
        condition: service_healthy
      relay-5:
        condition: service_healthy
      sender:
        condition: service_healthy
      receiver:
        condition: service_healthy
    init: true
