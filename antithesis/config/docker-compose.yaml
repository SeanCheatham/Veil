services:
  message-pool:
    container_name: message-pool
    hostname: message-pool
    build:
      context: ../..
      dockerfile: Dockerfile.message-pool
    image: ${ANTITHESIS_REPOSITORY}/message-pool:latest
    expose:
      - "8081"
    init: true
    environment:
      - EPOCH_DURATION=15s
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:8081/health"]
      interval: 2s
      timeout: 5s
      retries: 10

  validator-1:
    container_name: validator-1
    hostname: validator-1
    build:
      context: ../..
      dockerfile: Dockerfile.validator
    image: ${ANTITHESIS_REPOSITORY}/validator:latest
    expose:
      - "8082"
    init: true
    environment:
      - VALIDATOR_ID=1
      - LEADER_HOST=validator-1
      - VALIDATOR_PEERS=validator-1:8082,validator-2:8082,validator-3:8082
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:8082/health"]
      interval: 2s
      timeout: 5s
      retries: 10
    depends_on:
      message-pool:
        condition: service_healthy

  validator-2:
    container_name: validator-2
    hostname: validator-2
    build:
      context: ../..
      dockerfile: Dockerfile.validator
    image: ${ANTITHESIS_REPOSITORY}/validator:latest
    expose:
      - "8082"
    init: true
    environment:
      - VALIDATOR_ID=2
      - LEADER_HOST=validator-1
      - VALIDATOR_PEERS=validator-1:8082,validator-2:8082,validator-3:8082
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:8082/health"]
      interval: 2s
      timeout: 5s
      retries: 10
    depends_on:
      message-pool:
        condition: service_healthy

  validator-3:
    container_name: validator-3
    hostname: validator-3
    build:
      context: ../..
      dockerfile: Dockerfile.validator
    image: ${ANTITHESIS_REPOSITORY}/validator:latest
