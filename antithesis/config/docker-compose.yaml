services:
  # Hello service - minimal HTTP server for initial validation
  hello:
    image: ${REGISTRY:-veil}/hello:${TAG:-latest}
    container_name: hello
    hostname: hello
    init: true
    expose:
      - "8080"
    environment:
      - PORT=8080
    healthcheck:
      test: ["CMD", "wget", "--spider", "--quiet", "http://localhost:8080/health"]
      interval: 5s
      timeout: 5s
      retries: 3
      start_period: 10s

  # Message Pool - starts first
  message-pool:
    image: ${REGISTRY:-veil}/message-pool:${TAG:-latest}
    container_name: message-pool
    hostname: message-pool
    init: true
    expose:
      - "8082"
    healthcheck:
      test: ["CMD", "wget", "--spider", "--quiet", "http://localhost:8082/health"]
      interval: 5s
      timeout: 5s
      retries: 3
      start_period: 10s

  # Validator nodes - depend on message-pool
  validator-node0:
    image: ${REGISTRY:-veil}/validator-node:${TAG:-latest}
    container_name: validator-node0
    hostname: validator-node0
    init: true
    labels:
      - "antithesis.partition.group=validators"
    environment:
      - VALIDATOR_ID=0
      - MESSAGE_POOL_URL=http://message-pool:8082
      - VALIDATOR_PEERS=http://validator-node1:8081,http://validator-node2:8081
    expose:
      - "8081"
    healthcheck:
      test: ["CMD", "wget", "--spider", "--quiet", "http://localhost:8081/health"]
      interval: 5s
      timeout: 5s
      retries: 3
      start_period: 10s
    depends_on:
      message-pool:
        condition: service_healthy

  validator-node1:
    image: ${REGISTRY:-veil}/validator-node:${TAG:-latest}
    container_name: validator-node1
    hostname: validator-node1
    init: true
    labels:
      - "antithesis.partition.group=validators"
    environment:
      - VALIDATOR_ID=1
      - MESSAGE_POOL_URL=http://message-pool:8082
      - VALIDATOR_PEERS=http://validator-node0:8081,http://validator-node2:8081
    expose:
      - "8081"
    healthcheck:
      test: ["CMD", "wget", "--spider", "--quiet", "http://localhost:8081/health"]
      interval: 5s
      timeout: 5s
      retries: 3
      start_period: 10s
    depends_on:
      message-pool:
        condition: service_healthy

  validator-node2:
    image: ${REGISTRY:-veil}/validator-node:${TAG:-latest}
    container_name: validator-node2
    hostname: validator-node2
    init: true
    labels:
      - "antithesis.partition.group=validators"
    environment:
      - VALIDATOR_ID=2
      - MESSAGE_POOL_URL=http://message-pool:8082
      - VALIDATOR_PEERS=http://validator-node0:8081,http://validator-node1:8081
    expose:
      - "8081"
    healthcheck:
      test: ["CMD", "wget", "--spider", "--quiet", "http://localhost:8081/health"]
      interval: 5s
      timeout: 5s
      retries: 3
      start_period: 10s
    depends_on:
      message-pool:
        condition: service_healthy

  # Relay nodes - depend on validator-nodes
  # Chain: relay0 -> relay1 -> relay2 -> relay3 -> relay4 -> validator
  # Now using epoch-based key rotation with master seeds
  relay-node0:
    image: ${REGISTRY:-veil}/relay-node:${TAG:-latest}
    container_name: relay-node0
    hostname: relay-node0
    init: true
    labels:
      - "antithesis.partition.group=relays"
    environment:
      - RELAY_ID=0
      - NEXT_HOP=relay-node1:8080
      - RELAY_MASTER_SEED=KzNhvFWQe7yR8pBwXdC4TmJgUoHaLsYx1q9nI3rE6Mk=
      - EPOCH_DURATION_SECONDS=60
    expose:
      - "8080"
    healthcheck:
      test: ["CMD", "wget", "--spider", "--quiet", "http://localhost:8080/health"]
      interval: 5s
      timeout: 5s
      retries: 3
      start_period: 10s
    depends_on:
      validator-node0:
        condition: service_healthy
      validator-node1:
        condition: service_healthy
      validator-node2:
        condition: service_healthy

  relay-node1:
    image: ${REGISTRY:-veil}/relay-node:${TAG:-latest}
    container_name: relay-node1
    hostname: relay-node1
    init: true
    labels:
      - "antithesis.partition.group=relays"
    environment:
      - RELAY_ID=1
      - NEXT_HOP=relay-node2:8080
      - RELAY_MASTER_SEED=VpQcGtYw2hXjNsKmL8bFrDe5oU7iA0nZ4xWvJz3C1Hg=
      - EPOCH_DURATION_SECONDS=60
    expose:
      - "8080"
    healthcheck:
      test: ["CMD", "wget", "--spider", "--quiet", "http://localhost:8080/health"]
      interval: 5s
      timeout: 5s
      retries: 3
      start_period: 10s
    depends_on:
      validator-node0:
        condition: service_healthy
      validator-node1:
        condition: service_healthy
      validator-node2:
        condition: service_healthy

  relay-node2:
    image: ${REGISTRY:-veil}/relay-node:${TAG:-latest}
    container_name: relay-node2
    hostname: relay-node2
    init: true
    labels:
      - "antithesis.partition.group=relays"
    environment:
      - RELAY_ID=2
      - NEXT_HOP=relay-node3:8080
      - RELAY_MASTER_SEED=BwS9fXkMnYz1pTqR7vO2hJc4uE6gLaI8xKdNmW0sAVe=
      - EPOCH_DURATION_SECONDS=60
    expose:
      - "8080"
    healthcheck:
      test: ["CMD", "wget", "--spider", "--quiet", "http://localhost:8080/health"]
      interval: 5s
      timeout: 5s
      retries: 3
      start_period: 10s
    depends_on:
      validator-node0:
        condition: service_healthy
      validator-node1:
        condition: service_healthy
      validator-node2:
        condition: service_healthy

  relay-node3:
    image: ${REGISTRY:-veil}/relay-node:${TAG:-latest}
    container_name: relay-node3
    hostname: relay-node3
    init: true
    labels:
      - "antithesis.partition.group=relays"
    environment:
      - RELAY_ID=3
      - NEXT_HOP=relay-node4:8080
      - RELAY_MASTER_SEED=DqH4mZy5oP1tVw8nKjR3bF6iA9xSgLcE7uN2aWsXkMf=
      - EPOCH_DURATION_SECONDS=60
    expose:
      - "8080"
    healthcheck:
      test: ["CMD", "wget", "--spider", "--quiet", "http://localhost:8080/health"]
      interval: 5s
      timeout: 5s
      retries: 3
      start_period: 10s
    depends_on:
      validator-node0:
        condition: service_healthy
      validator-node1:
        condition: service_healthy
      validator-node2:
        condition: service_healthy

  relay-node4:
    image: ${REGISTRY:-veil}/relay-node:${TAG:-latest}
    container_name: relay-node4
    hostname: relay-node4
    init: true
    labels:
      - "antithesis.partition.group=relays"
    environment:
      - RELAY_ID=4
      - NEXT_HOP=
      - VALIDATOR_URL=http://validator-node0:8081
      - RELAY_MASTER_SEED=FzK7pYn5wT0rMeB8jC1hXgU3vI6aLdS4oQsN9xWmEqH=
      - EPOCH_DURATION_SECONDS=60
    expose:
      - "8080"
    healthcheck:
      test: ["CMD", "wget", "--spider", "--quiet", "http://localhost:8080/health"]
      interval: 5s
      timeout: 5s
      retries: 3
      start_period: 10s
    depends_on:
      validator-node0:
        condition: service_healthy
      validator-node1:
        condition: service_healthy
      validator-node2:
        condition: service_healthy

  # Workloads - test drivers, no healthchecks
  sender-workload:
    image: ${REGISTRY:-veil}/sender-workload:${TAG:-latest}
    container_name: sender-workload
    hostname: sender-workload
    init: true
    environment:
      - RELAY_URL=http://relay-node0:8080
      - MESSAGE_INTERVAL_MS=1000
      - SENDER_ID=sender-0
      - EPOCH_DURATION_SECONDS=60
      - COVER_TRAFFIC_RATE=0.5
      - RELAY_MASTER_SEEDS=KzNhvFWQe7yR8pBwXdC4TmJgUoHaLsYx1q9nI3rE6Mk=,VpQcGtYw2hXjNsKmL8bFrDe5oU7iA0nZ4xWvJz3C1Hg=,BwS9fXkMnYz1pTqR7vO2hJc4uE6gLaI8xKdNmW0sAVe=,DqH4mZy5oP1tVw8nKjR3bF6iA9xSgLcE7uN2aWsXkMf=,FzK7pYn5wT0rMeB8jC1hXgU3vI6aLdS4oQsN9xWmEqH=
      # Recipient encryption (Plan 12) - X25519 public key
      - RECIPIENT_PUBLIC_KEY=1RBXurzx2icqvhz8O+n4rjCI7GU5fbvu4K7gyp7K2D4=
    depends_on:
      relay-node0:
        condition: service_healthy
      relay-node1:
        condition: service_healthy
      relay-node2:
        condition: service_healthy
      relay-node3:
        condition: service_healthy
      relay-node4:
        condition: service_healthy

  receiver-workload:
    image: ${REGISTRY:-veil}/receiver-workload:${TAG:-latest}
    container_name: receiver-workload
    hostname: receiver-workload
    init: true
    environment:
      - MESSAGE_POOL_URL=http://message-pool:8082
      - RECEIVER_ID=receiver-0
      - POLL_INTERVAL_MS=500
      # Recipient decryption (Plan 12) - X25519 key pair
      - RECEIVER_PRIVATE_KEY=PrKd9jwttESuuuh+Im4nCrpD7iDdkepP7oUk2ekl2nI=
      - RECEIVER_PUBLIC_KEY=1RBXurzx2icqvhz8O+n4rjCI7GU5fbvu4K7gyp7K2D4=
    depends_on:
      relay-node0:
        condition: service_healthy
      relay-node1:
        condition: service_healthy
      relay-node2:
        condition: service_healthy
      relay-node3:
        condition: service_healthy
      relay-node4:
        condition: service_healthy

  # Longevity workload - runs indefinitely for extended period validation
  # Tracks cumulative statistics, epoch transitions, and delivery rates
  longevity-workload:
    image: ${REGISTRY:-veil}/longevity:${TAG:-latest}
    container_name: longevity-workload
    hostname: longevity-workload
    init: true
    environment:
      - RELAY_URL=http://relay-node0:8080
      - MESSAGE_POOL_URL=http://message-pool:8082
      - VALIDATOR_URLS=http://validator-node0:8081,http://validator-node1:8081,http://validator-node2:8081
      - EPOCH_DURATION_SECONDS=60
      - REPORT_INTERVAL_SECONDS=300
      - DELIVERY_THRESHOLD=0.8
      - RELAY_MASTER_SEEDS=KzNhvFWQe7yR8pBwXdC4TmJgUoHaLsYx1q9nI3rE6Mk=,VpQcGtYw2hXjNsKmL8bFrDe5oU7iA0nZ4xWvJz3C1Hg=,BwS9fXkMnYz1pTqR7vO2hJc4uE6gLaI8xKdNmW0sAVe=,DqH4mZy5oP1tVw8nKjR3bF6iA9xSgLcE7uN2aWsXkMf=,FzK7pYn5wT0rMeB8jC1hXgU3vI6aLdS4oQsN9xWmEqH=
      # For local validation, limit iterations (0 = unlimited for Antithesis)
      - MAX_ITERATIONS=${MAX_ITERATIONS:-10}
    depends_on:
      relay-node0:
        condition: service_healthy
      relay-node1:
        condition: service_healthy
      relay-node2:
        condition: service_healthy
      relay-node3:
        condition: service_healthy
      relay-node4:
        condition: service_healthy

  # Test Composer container - holds all first_* test commands in /opt/antithesis/test/v1/veil/
  # This container stays running with sleep infinity while Test Composer executes commands
  test-composer:
    image: ${REGISTRY:-veil}/test-composer:${TAG:-latest}
    container_name: test-composer
    hostname: test-composer
    init: true
    environment:
      # Environment variables for all test commands
      - HELLO_URL=http://hello:8080
      - MESSAGE_POOL_URL=http://message-pool:8082
      - VALIDATOR_URLS=http://validator-node0:8081,http://validator-node1:8081,http://validator-node2:8081
      - RELAY_URL=http://relay-node0:8080
      - RELAY_URLS=http://relay-node0:8080,http://relay-node1:8080,http://relay-node2:8080,http://relay-node3:8080,http://relay-node4:8080
      - EPOCH_DURATION_SECONDS=60
      - COVER_TRAFFIC_RATE=0.5
      - RELAY_MASTER_SEEDS=KzNhvFWQe7yR8pBwXdC4TmJgUoHaLsYx1q9nI3rE6Mk=,VpQcGtYw2hXjNsKmL8bFrDe5oU7iA0nZ4xWvJz3C1Hg=,BwS9fXkMnYz1pTqR7vO2hJc4uE6gLaI8xKdNmW0sAVe=,DqH4mZy5oP1tVw8nKjR3bF6iA9xSgLcE7uN2aWsXkMf=,FzK7pYn5wT0rMeB8jC1hXgU3vI6aLdS4oQsN9xWmEqH=
      - RECEIVER_A_SEED=test-seed-receiver-a-12345
      - RECEIVER_B_SEED=test-seed-receiver-b-67890
      # Longevity workload configuration
      - REPORT_INTERVAL_SECONDS=300
      - DELIVERY_THRESHOLD=0.8
      # For local validation, limit driver iterations (0 = unlimited for Antithesis)
      - MAX_ITERATIONS=${MAX_ITERATIONS:-10}
    depends_on:
      hello:
        condition: service_healthy
      message-pool:
        condition: service_healthy
      validator-node0:
        condition: service_healthy
      validator-node1:
        condition: service_healthy
      validator-node2:
        condition: service_healthy
      relay-node0:
        condition: service_healthy
      relay-node1:
        condition: service_healthy
      relay-node2:
        condition: service_healthy
      relay-node3:
        condition: service_healthy
      relay-node4:
        condition: service_healthy
