    init: true
    environment:
      - RECEIVER_HOST=receiver
      - RECEIVER_PORT=8085
      - EPOCH_DURATION=15s
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:8084/health"]
      interval: 2s
      timeout: 5s
      retries: 10
    depends_on:
