# Minimal skeleton configuration for Antithesis validation
# This compose file is incrementally expanded as services are implemented.
# Currently contains: hello, message-pool, validator-nodes, first_setup, pool_health, validator_health

services:
  # Hello service - minimal HTTP server with /health endpoint
  hello:
    image: ${REGISTRY:-veil}/hello:${TAG:-latest}
    container_name: hello
    hostname: hello
    init: true
    build:
      context: ../..
      dockerfile: cmd/hello/Dockerfile
    expose:
      - "8080"
    environment:
      - PORT=8080
    healthcheck:
      test: ["CMD", "wget", "--spider", "--quiet", "http://localhost:8080/health"]
      interval: 5s
      timeout: 5s
      retries: 3
      start_period: 10s

  # Message-pool service - append-only ciphertext store
  message-pool:
    image: ${REGISTRY:-veil}/message-pool:${TAG:-latest}
    container_name: message-pool
    hostname: message-pool
    init: true
    build:
      context: ../..
      dockerfile: cmd/message-pool/Dockerfile
    expose:
      - "8082"
    environment:
      - PORT=8082
    healthcheck:
      test: ["CMD", "wget", "--spider", "--quiet", "http://localhost:8082/health"]
      interval: 5s
      timeout: 5s
      retries: 3
      start_period: 10s

  # Validator nodes - BFT consensus for message ordering (stub consensus for now)
  validator-node0:
    image: ${REGISTRY:-veil}/validator-node:${TAG:-latest}
    container_name: validator-node0
    hostname: validator-node0
    init: true
    build:
      context: ../..
      dockerfile: cmd/validator-node/Dockerfile
    labels:
      - "antithesis.partition.group=validators"
    environment:
      - VALIDATOR_ID=0
      - MESSAGE_POOL_URL=http://message-pool:8082
      - VALIDATOR_PEERS=http://validator-node1:8081,http://validator-node2:8081
      - PORT=8081
    expose:
      - "8081"
    healthcheck:
      test: ["CMD", "wget", "--spider", "--quiet", "http://localhost:8081/health"]
      interval: 5s
      timeout: 5s
      retries: 3
      start_period: 10s
    depends_on:
      message-pool:
        condition: service_healthy

  validator-node1:
    image: ${REGISTRY:-veil}/validator-node:${TAG:-latest}
    container_name: validator-node1
    hostname: validator-node1
    init: true
    build:
      context: ../..
      dockerfile: cmd/validator-node/Dockerfile
    labels:
      - "antithesis.partition.group=validators"
    environment:
      - VALIDATOR_ID=1
      - MESSAGE_POOL_URL=http://message-pool:8082
      - VALIDATOR_PEERS=http://validator-node0:8081,http://validator-node2:8081
      - PORT=8081
    expose:
      - "8081"
    healthcheck:
      test: ["CMD", "wget", "--spider", "--quiet", "http://localhost:8081/health"]
      interval: 5s
      timeout: 5s
      retries: 3
      start_period: 10s
    depends_on:
      message-pool:
        condition: service_healthy

  validator-node2:
    image: ${REGISTRY:-veil}/validator-node:${TAG:-latest}
    container_name: validator-node2
    hostname: validator-node2
    init: true
    build:
      context: ../..
      dockerfile: cmd/validator-node/Dockerfile
    labels:
      - "antithesis.partition.group=validators"
    environment:
      - VALIDATOR_ID=2
      - MESSAGE_POOL_URL=http://message-pool:8082
      - VALIDATOR_PEERS=http://validator-node0:8081,http://validator-node1:8081
      - PORT=8081
    expose:
      - "8081"
    healthcheck:
      test: ["CMD", "wget", "--spider", "--quiet", "http://localhost:8081/health"]
      interval: 5s
      timeout: 5s
      retries: 3
      start_period: 10s
    depends_on:
      message-pool:
        condition: service_healthy

  # first_setup workload - validates services_reachable property (hello)
  # Naming convention: first_* runs once before fault injection
  first_setup:
    image: ${REGISTRY:-veil}/first_setup:${TAG:-latest}
    container_name: first_setup
    hostname: first_setup
    init: true
    build:
      context: ../..
      dockerfile: antithesis/workloads/first_setup/Dockerfile
    environment:
      - HELLO_URL=http://hello:8080
    depends_on:
      hello:
        condition: service_healthy

  # pool_health workload - validates message-pool health and append-only property
  # Naming convention: first_* runs once before fault injection
  first_pool_health:
    image: ${REGISTRY:-veil}/pool_health:${TAG:-latest}
    container_name: first_pool_health
    hostname: first_pool_health
    init: true
    build:
      context: ../..
      dockerfile: antithesis/workloads/pool_health/Dockerfile
    environment:
      - MESSAGE_POOL_URL=http://message-pool:8082
    depends_on:
      message-pool:
        condition: service_healthy

  # validator_health workload - validates validator health, submit, and pool integration
  # Naming convention: first_* runs once before fault injection
  first_validator_health:
    image: ${REGISTRY:-veil}/validator_health:${TAG:-latest}
    container_name: first_validator_health
    hostname: first_validator_health
    init: true
    build:
      context: ../..
      dockerfile: antithesis/workloads/validator_health/Dockerfile
    environment:
      - VALIDATOR_URLS=http://validator-node0:8081,http://validator-node1:8081,http://validator-node2:8081
      - MESSAGE_POOL_URL=http://message-pool:8082
    depends_on:
      validator-node0:
        condition: service_healthy
      validator-node1:
        condition: service_healthy
      validator-node2:
        condition: service_healthy
